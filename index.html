<!DOCTYPE html>
<html>
<head>
    <title>Even Odd Checker</title>
    <style>
        body{
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .box{
            background: #1e293b;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 300px;
        }

        input{
            width: 90%;
            padding: 10px;
            margin: 10px 0;
        }

        button{
            padding: 10px 20px;
            background: #38bdf8;
            border: none;
            color: white;
            cursor: pointer;
        }

        button:hover{
            background: #0ea5e9;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Even / Odd Checker</h2>

    <form action="/check" method="POST">
        <input type="number" name="number" placeholder="Enter a number" required>
        <br>
        <button type="submit">Check</button>
    </form>
</div>

</body>
</html>
